name: Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Expo preview build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Export Expo web bundle
        run: npx expo export --platform web --output-dir dist
        env:
          NODE_ENV: production
          CI: "1"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        id: artifact
        with:
          name: preview-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: dist/
          retention-days: 7

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## 📦 Preview build ready',
              '',
              `**Artifact:** \`preview-pr-${{ github.event.pull_request.number }}-${{ github.sha }}\``,
              '',
              `[⬇️ Download from Actions run](${run_url})`,
              '',
              '_Built from commit ${{ github.sha }}_',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
