<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mobile IDE — full app</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, system-ui; }
  .app-frame {
    width: 390px; height: 844px; border-radius: 48px; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12);
    position: relative;
  }
  .theme-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 14px; cursor: pointer;
    font: 500 12px/1 -apple-system, system-ui;
    border: 1px solid rgba(0,0,0,0.08); background: #fff;
    color: #29261b;
  }
  .theme-pill[data-active="true"] { background: #29261b; color: #fff; border-color: #29261b; }
  .theme-pill .sw { width: 10px; height: 10px; border-radius: 5px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="code-content.jsx"></script>
<script type="text/babel" src="themes.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="page-files.jsx"></script>
<script type="text/babel" src="page-find.jsx"></script>
<script type="text/babel" src="page-edit.jsx"></script>
<script type="text/babel" src="page-terminal.jsx"></script>
<script type="text/babel" src="page-git.jsx"></script>

<script type="text/babel">
  const PAGES = {
    files: FilesPage, find: FindPage, edit: EditPage, terminal: TerminalPage, git: GitPage,
  };

  function App({ initialPage = 'edit', initialTheme = 'glass' }) {
    const [page, setPage] = React.useState(initialPage);
    const [themeId, setThemeId] = React.useState(initialTheme);
    const theme = THEMES[themeId];
    const PageComp = PAGES[page];
    return (
      <ThemeCtx.Provider value={theme}>
        <div className="app-frame">
          <Shell page={page} onPage={setPage}>
            <PageComp />
          </Shell>
        </div>
      </ThemeCtx.Provider>
    );
  }

  function ThemeSwitcher({ themeId, onTheme }) {
    return (
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        {Object.entries(THEMES).map(([id, t]) => (
          <button key={id} onClick={() => onTheme(id)} className="theme-pill" data-active={id === themeId}>
            <span className="sw" style={{ background: t.bg }} />
            <span className="sw" style={{ background: t.accent }} />
            {t.name}
          </button>
        ))}
      </div>
    );
  }

  // Top-level: design canvas with one section per page, plus a global theme switch.
  function Root() {
    const [themeId, setThemeId] = React.useState('glass');
    const [activePage, setActivePage] = React.useState('edit');

    const pageList = [
      { id: 'files',    label: 'Files' },
      { id: 'find',     label: 'Find' },
      { id: 'edit',     label: 'Edit' },
      { id: 'terminal', label: 'Claude · Run' },
      { id: 'git',      label: 'Git' },
    ];

    return (
      <DesignCanvas>
        <DCSection id="all" title="Mobile IDE" subtitle={`Theme: ${THEMES[themeId].name} · tap nav to switch pages on each artboard`}>
          {pageList.map((p) => (
            <DCArtboard key={p.id} id={p.id} label={p.label} width={390} height={844} style={{ background: 'transparent', borderRadius: 48 }}>
              <ThemeCtx.Provider value={THEMES[themeId]}>
                <ThemedFrame page={p.id} setPage={setActivePage} />
              </ThemeCtx.Provider>
            </DCArtboard>
          ))}
        </DCSection>

        {/* Theme switcher floats — outside the world transform */}
        <ThemeFloating themeId={themeId} onTheme={setThemeId} />
      </DesignCanvas>
    );
  }

  // Each artboard locally manages its current page so the user can poke any one.
  function ThemedFrame({ page: defaultPage }) {
    const [page, setPage] = React.useState(defaultPage);
    const PageComp = PAGES[page];
    return (
      <Shell page={page} onPage={setPage}>
        <PageComp />
      </Shell>
    );
  }



  // Floating theme switcher — uses position:fixed so canvas pan/zoom doesn't affect it.
  function ThemeFloating({ themeId, onTheme }) {
    return ReactDOM.createPortal(
      <div style={{
        position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)',
        zIndex: 200, padding: '10px 14px',
        background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(20px)',
        borderRadius: 18, boxShadow: '0 6px 24px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.06)',
        display: 'flex', alignItems: 'center', gap: 12, fontFamily: '-apple-system, system-ui',
      }}>
        <span style={{ fontSize: 11, color: '#7a736b', textTransform: 'uppercase', letterSpacing: 1.2, fontWeight: 600 }}>Theme</span>
        <div style={{ display: 'flex', gap: 6 }}>
          {Object.entries(THEMES).map(([id, t]) => (
            <button key={id} onClick={() => onTheme(id)} style={{
              padding: '6px 10px', borderRadius: 12, cursor: 'pointer',
              border: '1px solid ' + (id === themeId ? '#29261b' : 'rgba(0,0,0,0.08)'),
              background: id === themeId ? '#29261b' : '#fff',
              color: id === themeId ? '#fff' : '#29261b',
              font: '500 12px/1 -apple-system, system-ui',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <span style={{ width: 10, height: 10, borderRadius: 5, background: t.bg, boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.2)' }} />
              <span style={{ width: 10, height: 10, borderRadius: 5, background: t.accent }} />
              {t.name}
            </button>
          ))}
        </div>
      </div>,
      document.body
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
